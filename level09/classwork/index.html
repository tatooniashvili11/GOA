<!-- Formatting tag-ები გამოიყენება ტექსტის სტილისა და მნიშვნელობის გამოსაჩენად. -->
 <!-- u tag ტექსტს  უნიშნავს underline-ს ( ხაზს დავბლა ) -->
  <!-- i tag ( italic tag ) ტექტს სტილს უცვლის და ჩვეულებრივიდან გადაჰყავს დახრილად -->
   <!-- em tag ტექსტს დახრილად აჩვენებს, მაგრამ განსხვავება ის არის, რომ მნიშვნელობას ანიჭებს -->
    <!-- Ь tag ამუქებს -->
     <!-- ტექსტს ამუქებს b, მაგრამ ამავე დროს მნიშვნელობას ანიჭებს -->
     <!-- screen reader-ზე მორგება იმიტომ არის აუცილებელი რომ შეზღუდულმა ადამიანებმა ისარგებლონ -->
    <!-- strong გამოიყენება იმისთვის, რომ ტექსტს ძლიერი აუცილებელი მნიშვნელობა მივანიჭოთ. -->
     <!-- a tag გამოიყენება ბმულის (link) შესაქმნელად. -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>

 </body>
 </html>
